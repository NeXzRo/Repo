name: Update Plugin List

on:
  workflow_dispatch:

  schedule:
    - cron: '0 * * * *'

  push:
    paths:
      - 'repo.json'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Update README
        run: |
          COUNT=$(jq '. | length' repo.json)

          LIST=$(jq -r '
            .[] |
            .RepoUrl as $url |

            (
              $url
              | sub("/$"; "")
              | sub("\\.git$"; "")
              | split("/")
              | .[-2] + "/" + .[-1]
            ) as $repo |

            "<tr><td><a href=\"\($url)\"><b>\(.Name)</b></a></td><td>v\(.AssemblyVersion)</td><td>\(.Punchline)</td><td><img src=\"https://img.shields.io/github/v/release/\($repo)?style=flat-square&label=Latest&color=blue\"></td><td><img src=\"https://img.shields.io/github/downloads/\($repo)/total?style=flat-square&label=Downloads&color=purple\"></td></tr>"
          ' repo.json)

          export COUNT
          export LIST

          python3 <<EOF
          import os
          import re

          filename = "README.MD"

          with open(filename, "r", encoding="utf-8") as f:
              content = f.read()

          count = os.environ["COUNT"]
          plugin_list = os.environ["LIST"]

          content = re.sub(
              r'badge/Plugins-\d+-blue',
              f'badge/Plugins-{count}-blue',
              content
          )

          start_marker = "<!-- PLUGIN_LIST_START -->"
          end_marker = "<!-- PLUGIN_LIST_END -->"

          table = f"""
          <table>
          <tr>
          <th>Plugin</th>
          <th>Version</th>
          <th>Description</th>
          <th>Release</th>
          <th>Downloads</th>
          </tr>
          {plugin_list}
          </table>
          """

          replacement = f"{start_marker}\n{table}\n{end_marker}"

          pattern = re.compile(
              re.escape(start_marker) + r'.*?' + re.escape(end_marker),
              re.DOTALL
          )

          content = pattern.sub(replacement, content)

          with open(filename, "w", encoding="utf-8") as f:
              f.write(content)
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.MD

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "docs: update plugin list"

          git push origin HEAD:${GITHUB_REF#refs/heads/}
