name: Update Plugin List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    paths:
      - 'repo.json'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Update README
        run: |
          COUNT=$(jq '. | length' repo.json)

          LIST=$(jq -r '
            .[] |
            .RepoUrl as $url |
            (
              $url
              | sub("/$"; "")
              | sub("\\.git$"; "")
              | split("/")
              | .[-2] + "/" + .[-1]
            ) as $repo |
            "<tr>
              <td><a href=\"\($url)\"><b>\(.Name)</b></a></td>
              <td>\(.Description)</td>
              <td align=\"center\"><img src=\"https://img.shields.io/github/v/release/\($repo)?style=flat-square&label=&color=blue\"></td>
              <td align=\"center\"><img src=\"https://img.shields.io/github/downloads/\($repo)/total?style=flat-square&label=Downloads&color=purple\"></td>
            </tr>"
          ' repo.json)

          export COUNT
          export LIST

          python3 <<'EOF'
          import os
          import re
          import sys

          filename = "README.md"

          with open(filename, "r", encoding="utf-8") as f:
              content = f.read()

          count = os.environ["COUNT"]
          plugin_list = os.environ["LIST"]

          content = re.sub(
              r'badge/Plugins-\d+-blue',
              f'badge/Plugins-{count}-blue',
              content
          )

          start_marker = "<table>"
          end_marker = "</table>"

          new_table = f"""<table>
          <tr>
          <th align="left">Plugin</th>
          <th align="left">Description</th>
          <th align="center">Version</th>
          <th align="center">Downloads</th>
          </tr>
          {plugin_list}
          </table>"""

          pattern = re.compile(
              re.escape(start_marker) + r'[\s\S]*?' + re.escape(end_marker),
              re.MULTILINE
          )

          match = pattern.search(content)

          if match:
              updated = pattern.sub(new_table, content, count=1)
          else:
              updated = content.rstrip() + "\n\n" + new_table + "\n"

          if updated == content:
              print("No changes detected.")
              sys.exit(0)

          with open(filename, "w", encoding="utf-8") as f:
              f.write(updated)

          print("README updated.")
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "docs: update plugin list [skip ci]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}