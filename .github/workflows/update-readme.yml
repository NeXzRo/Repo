name: Update Plugin List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    paths:
      - 'repo.json'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Update README
        run: |
          COUNT=$(jq '. | length' repo.json)

          LIST=$(jq -r '
            .[] |
            .RepoUrl as $url |
            (
              $url
              | sub("/$"; "")
              | sub("\\.git$"; "")
              | split("/")
              | .[-2] + "/" + .[-1]
            ) as $repo |
            "<tr>
              <td><a href=\"\($url)\"><b>\(.Name)</b></a></td>
              <td>\(.Description)</td>
              <td align=\"center\"><img src=\"https://img.shields.io/github/v/release/\($repo)?style=flat-square&label=&color=blue\"></td>
              <td align=\"center\"><img src=\"https://img.shields.io/github/downloads/\($repo)/total?style=flat-square&label=Downloads&color=purple\"></td>
            </tr>"
          ' repo.json)

          export COUNT
          export LIST

          python3 <<'EOF'
          import os
          import re

          filename = "README.md"
          with open(filename, "r", encoding="utf-8") as f:
              content = f.read()

          count = os.environ["COUNT"]
          plugin_list = os.environ["LIST"]

          content = re.sub(r'badge/Plugins-\d+-blue', f'badge/Plugins-{count}-blue', content)

          start_marker = ""
          end_marker = ""

          new_table = "<table>\n<tr>\n<th align=\"left\">Plugin</th>\n<th align=\"left\">Description</th>\n<th align=\"center\">Version</th>\n<th align=\"center\">Downloads</th>\n</tr>\n" + plugin_list + "</table>"

          pattern = re.compile(f"{re.escape(start_marker)}.*?{re.escape(end_marker)}", re.DOTALL)
          
          if start_marker in content and end_marker in content:
              content = pattern.sub(f"{start_marker}\n{new_table}\n{end_marker}", content)
          else:
              content = content.rstrip() + f"\n\n{start_marker}\n{new_table}\n{end_marker}\n"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(content)
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "docs: update plugin list"
          git push origin HEAD:${GITHUB_REF#refs/heads/}