name: Update Plugin List

on:
  workflow_dispatch:

  schedule:
    - cron: '0 * * * *'

  push:
    paths:
      - 'repo.json'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate plugin list
        run: |
          COUNT=$(jq '. | length' repo.json)

          LIST=$(jq -r '
            .[] |
            .RepoUrl as $url |

            (
              $url
              | sub("/$"; "")
              | sub("\\.git$"; "")
              | split("/")
              | .[-2] + "/" + .[-1]
            ) as $repo |

            "* [**\(.Name)**](\($url)) `v\(.AssemblyVersion)` — \(.Punchline) ![Release](https://img.shields.io/github/v/release/\($repo)?style=flat-square&label=Latest&color=blue) ![Downloads](https://img.shields.io/github/downloads/\($repo)/total?style=flat-square&label=Downloads&color=orange)"
          ' repo.json)

          export COUNT
          export LIST

          python3 <<EOF
          import os
          import re

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          count = os.environ["COUNT"]
          plugin_list = os.environ["LIST"]

          content = re.sub(
              r'badge/Plugins-\d+-blue',
              f'badge/Plugins-{count}-blue',
              content
          )

          start_marker = "<!-- PLUGIN_LIST_START -->"
          end_marker = "<!-- PLUGIN_LIST_END -->"

          new_section = f"{start_marker}\n\n{plugin_list}\n\n{end_marker}"

          pattern = re.compile(
              re.escape(start_marker) + r'.*?' + re.escape(end_marker),
              re.DOTALL
          )

          content = pattern.sub(new_section, content)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(content)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs: update plugin list"

      - name: Push changes
        run: |
          git push origin HEAD:${GITHUB_REF#refs/heads/}